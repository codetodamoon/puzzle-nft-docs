site_name: TreasureHunt Documentation
site_description: Blockchain Puzzle NFT dApp - User Guide, Developer Documentation, and API Reference
site_author: TreasureHunt
site_url: https://codetodamoon.github.io/puzzle-nft-docs/

repo_name: puzzle-nft-docs
repo_url: https://github.com/codetodamoon/puzzle-nft-docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
    - scheme: slate
      primary: deep orange
      accent: amber
  features:
    - navigation.top
    - navigation.tracking
    - search.suggest

nav:
  - Introduction:
      - introduction/overview.md
      - introduction/how-it-works.md
      - introduction/key-features.md
  - User Guide:
      - user-guide/getting-started.md
      - user-guide/connecting-wallet.md
      - user-guide/creating-puzzles.md
      - user-guide/solving-puzzles.md
      - user-guide/victory-nft.md
      - user-guide/profile-dashboard.md
      - user-guide/faq.md
  - Developer Guide:
      - developer-guide/architecture.md
      - developer-guide/smart-contract.md
      - developer-guide/contract-api.md
      - developer-guide/frontend-setup.md
      - developer-guide/deployment.md
      - developer-guide/testing.md
  - Admin Guide:
      - admin-guide/configuration.md
  - Reference:
      - reference/glossary.md
      - reference/contract-addresses.md
      - reference/events.md

markdown_extensions:
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

copyright: Copyright &copy; 2026 TreasureHunt
